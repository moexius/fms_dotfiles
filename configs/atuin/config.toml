# ~/.config/atuin/config.toml

# Sync — self-hosted
update_check = false
sync_address = "https://atuin.moexius.lab"
auto_sync = true
sync_frequency = "5m"
records_sync_enabled = true
daemon_enabled = false

# UI
style = "compact"
inline_height = 15
show_preview = true
max_preview_height = 4
show_help = false

# Search
search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "directory"

# Behaviour
enter_accept = false
keymap_mode = "auto"
exit_mode = "return-original"

# History filters — skip noisy commands
history_filter = [
    "^ls",
    "^ll",
    "^la",
    "^cd",
    "^pwd",
    "^clear",
    "^cls",
    "^exit",
    "^history",
]
