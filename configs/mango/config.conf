# MangoWM config — hfo-aorus Sunshine streaming session
# NOT a daily driver. Used only when launching MangoWM session from SDDM for headless streaming.
# Wiki: https://github.com/DreamMaoMao/mango/wiki/

# ============================================================
# PERFORMANCE — all effects off
# ============================================================
blur=0
blur_layer=0
blur_optimized=0
shadows=0
layer_shadows=0
animations=0
layer_animations=0

# ============================================================
# MONITOR
# ============================================================
# Physical ultrawide — uncomment if MangoWM session has DP-1 active
# monitor=DP-1,3840x1600@144,0x0
# Headless virtual display is created by create-headless.sh at startup

# ============================================================
# KEYBOARD
# ============================================================
xkb_rules_layout=us intl
repeat_rate=30
repeat_delay=500
numlockon=0

# ============================================================
# APPEARANCE — minimal, dark, no gaps
# ============================================================
borderpx=2
gappih=0
gappiv=0
gappoh=0
gappov=0
smartgaps=0
no_border_when_single=1
no_radius_when_single=1
border_radius=0
focused_opacity=1.0
unfocused_opacity=1.0

rootcolor=0x111111ff
bordercolor=0x333333ff
focuscolor=0x5588aaff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0x444444ff
maximizescreencolor=0x5588aaff
overlaycolor=0x333333ff

# ============================================================
# CURSOR
# ============================================================
cursor_size=24

# ============================================================
# FOCUS & BEHAVIOUR
# ============================================================
sloppyfocus=0
warpcursor=0
focus_on_activate=1
drag_tile_to_tile=0
enable_floating_snap=0
enable_hotarea=0
idleinhibit_ignore_visible=1

# ============================================================
# LAYOUT — monocle on all tags (fullscreen, streaming use)
# ============================================================
tagrule=id:1,layout_name:monocle
tagrule=id:2,layout_name:monocle
tagrule=id:3,layout_name:monocle
tagrule=id:4,layout_name:monocle
tagrule=id:5,layout_name:monocle
tagrule=id:6,layout_name:monocle
tagrule=id:7,layout_name:monocle
tagrule=id:8,layout_name:monocle
tagrule=id:9,layout_name:monocle

# ============================================================
# AUTOSTART
# ============================================================
# Create headless virtual display for Sunshine
exec=~/.config/mango/create-headless.sh

# ============================================================
# KEY BINDINGS
# ============================================================

# Terminal
bind=SUPER,Return,spawn,kitty
bind=Alt,Return,spawn,kitty

# Kill / quit
bind=ALT,q,killclient,
bind=SUPER,m,quit

# Reload config
bind=SUPER,r,reload_config

# Window state
bind=ALT,f,togglefullscreen,
bind=ALT,SHIFT+f,togglefakefullscreen,
bind=ALT,backslash,togglefloating,
bind=ALT,a,togglemaximizescreen,
bind=ALT,Tab,toggleoverview,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,i,restore_minimized

# Focus
bind=SUPER,Tab,focusstack,next
bind=ALT,Left,focusdir,left
bind=ALT,Right,focusdir,right
bind=ALT,Up,focusdir,up
bind=ALT,Down,focusdir,down

# Move windows
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down

# Move floating window
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50

# Resize floating window
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50

# Tag (workspace) switch
bind=Ctrl,1,view,1,0
bind=Ctrl,2,view,2,0
bind=Ctrl,3,view,3,0
bind=Ctrl,4,view,4,0
bind=Ctrl,5,view,5,0

# Move client to tag
bind=Alt,1,tag,1,0
bind=Alt,2,tag,2,0
bind=Alt,3,tag,3,0
bind=Alt,4,tag,4,0
bind=Alt,5,tag,5,0

# Navigate tags
bind=SUPER,Left,viewtoleft,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=CTRL,Right,viewtoright_have_client,0

# Switch layout
bind=SUPER,n,switch_layout

# ============================================================
# MOUSE BINDINGS
# ============================================================
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# ============================================================
# AXIS BINDINGS
# ============================================================
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client
